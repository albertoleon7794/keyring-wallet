<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KeyRing – Connect to Witness</title>

  <meta property="og:title" content="Connect to Witness" />
  <meta property="og:description" content="Tap to connect to a witness server with the KeyRing app." />
  <meta property="og:image" content="https://witness.asml.berkmancenter.org/connect/og-image.png" />
  <meta property="og:url" content="https://witness.asml.berkmancenter.org/connect" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Connect to Witness" />
  <meta name="twitter:description" content="Tap to connect to a witness server with the KeyRing app." />
  <meta name="twitter:image" content="https://witness.asml.berkmancenter.org/connect/og-image.png" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #6E121D;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 56px 44px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo { margin-bottom: 24px; }
    .logo img { max-width: 380px; width: 100%; height: auto; }
    h1 { color: #1a1a1a; font-size: 22px; margin-bottom: 12px; }
    p { color: #555; font-size: 15px; line-height: 1.6; margin-bottom: 28px; }
    .store-links {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .store-links a { display: inline-block; transition: opacity 0.2s; }
    .store-links a:hover { opacity: 0.8; }
    .store-links img { width: 200px; height: auto; }
    .fallback {
      margin-top: 24px;
      font-size: 13px;
      color: #888;
    }
    .fallback a { color: #6E121D; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="og-image.png" alt="Applied Social Media Lab – Berkman Klein Center" />
    </div>
    <h1>Connect to Witness</h1>
    <p>
      This link connects you to a witness server for verified credential exchanges.
      Install the KeyRing app to proceed.
    </p>
    <div class="store-links">
      <a href="https://testflight.apple.com/join/UumVZn6g">
        <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on the App Store" />
      </a>
      <a href="https://play.google.com/store/apps/details?id=asml.bkc.harvard.wallet">
        <img src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png" alt="Get it on Google Play" />
      </a>
    </div>
    <p class="fallback">
      Already have the app? <a href="#" id="open-link">Tap here to open it.</a>
    </p>
  </div>
  <script>
    var params = window.location.search;
    var fallback = document.getElementById('open-link');
    if (params) {
      var deepLink = 'keyring://connect' + params;
      fallback.href = deepLink;
      fallback.addEventListener('click', function(e) {
        e.preventDefault();
        window.location.href = deepLink;
        setTimeout(function() {
          window.location.href = 'https://witness.asml.berkmancenter.org/connect' + params;
        }, 1500);
      });
    } else {
      fallback.parentElement.style.display = 'none';
    }
  </script>
</body>
</html>
