name: Ship to iTunes
description: Upload an artifact to iTunes Connect

inputs:
  app_store_connect_issuer_id:
    description: The iTunes Connect issuer ID
    required: true
  app_store_connect_key_identifier:
    description: The iTunes Connect key identifier
    required: true
  app_store_connect_private_key:
    description: |
      The iTunes Connect private key.
    required: true
  version_code:
    description: |
      The build number for the release notes. i.e 1471
    required: true
  version_name:
    description: |
      The version name for the release notes. i.e 1.0.1
    required: true
  distribute_external:
    description: Whether to distribute to external testers
    required: false
    default: 'false'
  beta_groups:
    description: Comma-separated list of beta groups
    required: false
    default: 'The Team, IDIM Team'
  release_notes:
    description: Release notes for TestFlight. If not provided, will use version-based default.
    required: false
    default: ''

runs:
  using: composite
  steps:
    # https://blog.codemagic.io/app-store-connect-api-codemagic-cli-tools/
    - name: Install Codemagic CLI Tools
      shell: bash
      run: |
        pip3 install codemagic-cli-tools

    - name: Ship to iTunes
      shell: bash {0}
      env:
        APP_STORE_CONNECT_ISSUER_ID: ${{ inputs.app_store_connect_issuer_id }}
        APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ inputs.app_store_connect_key_identifier }}
        APP_STORE_CONNECT_PRIVATE_KEY: ${{ inputs.app_store_connect_private_key }}
        VERSION_CODE: ${{ inputs.version_code }}
        VERSION_NAME: ${{ inputs.version_name }}
        DISTRIBUTE_EXTERNAL: ${{ inputs.distribute_external }}
        BETA_GROUPS: ${{ inputs.beta_groups }}
        RELEASE_NOTES: ${{ inputs.release_notes }}
      run: |
        export PATH=$PATH:/Library/Frameworks/Python.framework/Versions/3.11/bin
        
        echo "Publishing to TestFlight with beta group: $BETA_GROUPS"
        echo "---"
        
        # Determine release notes: use provided notes, or fallback to version-based
        if [ -n "$RELEASE_NOTES" ] && [ "$RELEASE_NOTES" != "" ]; then
          WHATS_NEW="$RELEASE_NOTES"
        else
          WHATS_NEW="Release ${VERSION_NAME}-${VERSION_CODE}"
        fi
        
        echo "Release notes: $WHATS_NEW"
        
        # Simple publish command with single beta group
        if [ "$DISTRIBUTE_EXTERNAL" = "true" ]; then
          app-store-connect publish \
            --enable-package-validation \
            --max-build-processing-wait 10 \
            --testflight \
            --distribute-external \
            --beta-group "$BETA_GROUPS" \
            --whats-new "$WHATS_NEW"
        else
          app-store-connect publish \
            --enable-package-validation \
            --max-build-processing-wait 10 \
            --testflight \
            --beta-group "$BETA_GROUPS" \
            --whats-new "$WHATS_NEW"
        fi
