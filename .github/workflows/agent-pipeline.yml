name: QA Pipeline (Mac)

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:  # manual trigger for testing

jobs:
  qa-tests:
    # SECURITY: Only run on our repo's PRs, NOT from forks
    if: |
      github.event.label.name == 'needs-qa' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, macos, arm64]
    timeout-minutes: 45
    
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          submodules: true
          fetch-depth: 0

      - name: Setup Node
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          nvm use 20.19.2
          node --version

      - name: Install dependencies
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          nvm use 20.19.2
          yarn install --immutable

      - name: Jest unit tests
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          nvm use 20.19.2
          yarn test 2>&1 | tee /tmp/qa-jest.log
        continue-on-error: true

      - name: Appium E2E smoke test
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          nvm use 20.19.2
          appium --session-override --log /tmp/appium.log &
          APP_PID=$!
          sleep 8
          python3 ~/.hermes/scripts/qa-session-test.py ios --json 2>&1 | tee /tmp/qa-appium.log
          kill $APP_PID 2>/dev/null || true
        continue-on-error: true

      - name: Post results as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let jestLog = '', appiumLog = '';
            try { jestLog = fs.readFileSync('/tmp/qa-jest.log', 'utf8').slice(-3000); } catch(e) {}
            try { appiumLog = fs.readFileSync('/tmp/qa-appium.log', 'utf8').slice(-2000); } catch(e) {}
            
            const body = `## 🤖 QA Results\n\n### Jest\n\`\`\`\n${jestLog || 'No results'}\n\`\`\`\n\n### Appium E2E\n\`\`\`\n${appiumLog || 'No results'}\n\`\`\``;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
